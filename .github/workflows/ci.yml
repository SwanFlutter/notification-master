name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "11"
            testbench: "^9.0"
          - php: "8.3"
            laravel: "11"
            testbench: "^9.0"
          - php: "8.2"
            laravel: "12"
            testbench: "^10.0"
          - php: "8.3"
            laravel: "12"
            testbench: "^10.0"
          - php: "8.4"
            laravel: "12"
            testbench: "^10.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, openssl
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Pin testbench version in composer.json
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: v2-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            v2-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-

      - name: Install dependencies (fresh resolve — no lock file)
        run: composer update --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Dump autoload
        run: composer dump-autoload --optimize

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage
